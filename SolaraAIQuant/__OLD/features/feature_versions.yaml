# ═══════════════════════════════════════════════════════════════════════════════
# Solara AI Quant — Feature Version Schemas
# ═══════════════════════════════════════════════════════════════════════════════
#
# Each version defines the exact list of feature columns a model expects.
# A model's feature_version in model_registry.yaml must match a key here.
#
# When you add new features to feature_engineer.py:
#   1. Define a new version key below (e.g. v4)
#   2. List ALL columns the new model needs (not just the new ones)
#   3. Update the model's feature_version in model_registry.yaml
#   4. Old models keep their old version — they are unaffected
#
# The Feature Validator checks this at startup and before every cycle.
# A model missing any required column is skipped — never runs on wrong features.
# ═══════════════════════════════════════════════════════════════════════════════

versions:

  v1:
    columns:
      - ret
      - ret_lag1
      - body_size
      - candle_body_pct
      - rsi_value

  v2:
    columns:
      - ret
      - ret_lag1
      - ret_lag2
      - body_size
      - candle_body_pct
      - rsi_value
      - rsi_slope
      - rsi_slope_lag1
      - dist_bb_upper

  v3:
    columns:
      - ret
      - ret_lag1
      - ret_lag2
      - ret_lag3
      - body_size
      - candle_body_pct
      - rsi_value
      - rsi_slope
      - rsi_slope_lag1
      - rsi_slope_lag2
      - rsi_slope_lag3
      - RSI_slope_3
      - dist_bb_upper
      - dist_bb_lower
      - dist_bb_upper_lag1
      - dist_bb_upper_lag2
      - dist_bb_upper_lag3
      - price_momentum

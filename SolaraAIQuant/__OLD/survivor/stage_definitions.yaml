# ═══════════════════════════════════════════════════════════════════════════════
# Solara AI Quant — Survivor Engine Stage Definitions
# ═══════════════════════════════════════════════════════════════════════════════
#
# 22 stages of progressive position protection.
# Each stage activates when pips_in_profit >= threshold_pips.
# protection_pct: fraction of max-reached profit that the SL locks in.
# tp_active: whether the take-profit order remains active at this stage.
#
# Rules:
#   - Stages only advance forward — never revert.
#   - SL is only ever moved in the direction of profit protection.
#   - From Stage 14 onwards, TP is removed (pure trailing).
# ═══════════════════════════════════════════════════════════════════════════════

stages:
  STAGE_0:
    threshold_pips: 0
    protection_pct: 0.00
    tp_active: true
    description: "Entry — SL at initial position, full TP active"

  STAGE_1:
    threshold_pips: 8
    protection_pct: 0.10
    tp_active: true
    description: "Initial Lock — 10% of max profit protected"

  STAGE_2:
    threshold_pips: 10
    protection_pct: 0.15
    tp_active: true
    description: "Building — 15% locked"

  STAGE_3:
    threshold_pips: 15
    protection_pct: 0.20
    tp_active: true
    description: "Developing — 20% protected"

  STAGE_4:
    threshold_pips: 20
    protection_pct: 0.25
    tp_active: true
    description: "Base Secure — 25% locked"

  STAGE_5:
    threshold_pips: 25
    protection_pct: 0.30
    tp_active: true
    description: "Quarter Lock — 30% protected"

  STAGE_6:
    threshold_pips: 30
    protection_pct: 0.35
    tp_active: true
    description: "Growing — 35% locked"

  STAGE_7:
    threshold_pips: 35
    protection_pct: 0.40
    tp_active: true
    description: "Approaching Half — 40% protected"

  STAGE_8:
    threshold_pips: 40
    protection_pct: 0.45
    tp_active: true
    description: "Near Half — 45% locked"

  STAGE_9:
    threshold_pips: 45
    protection_pct: 0.50
    tp_active: true
    description: "Half Lock — exactly 50% of max profit protected"

  STAGE_10:
    threshold_pips: 50
    protection_pct: 0.55
    tp_active: true
    description: "Majority — 55% locked"

  STAGE_11:
    threshold_pips: 55
    protection_pct: 0.60
    tp_active: true
    description: "Solid — 60% protected"

  STAGE_12:
    threshold_pips: 60
    protection_pct: 0.65
    tp_active: true
    description: "Strong — 65% locked"

  STAGE_13:
    threshold_pips: 65
    protection_pct: 0.70
    tp_active: true
    description: "Dominant — 70% protected, TP still active"

  STAGE_14:
    threshold_pips: 70
    protection_pct: 0.72
    tp_active: false
    description: "Trail Start — TP removed, pure trailing begins, 72% locked"

  STAGE_15:
    threshold_pips: 80
    protection_pct: 0.75
    tp_active: false
    description: "Trail Active — 75% protected"

  STAGE_16:
    threshold_pips: 90
    protection_pct: 0.78
    tp_active: false
    description: "Trail Strong — 78% locked"

  STAGE_17:
    threshold_pips: 100
    protection_pct: 0.80
    tp_active: false
    description: "Full Lock — 80% of max profit protected"

  STAGE_18:
    threshold_pips: 120
    protection_pct: 0.82
    tp_active: false
    description: "Secure — 82% locked"

  STAGE_19:
    threshold_pips: 130
    protection_pct: 0.84
    tp_active: false
    description: "Very Secure — 84% protected"

  STAGE_20:
    threshold_pips: 150
    protection_pct: 0.86
    tp_active: false
    description: "Excellent — 86% locked"

  STAGE_21:
    threshold_pips: 180
    protection_pct: 0.88
    tp_active: false
    description: "Superior — 88% protected"

  STAGE_22:
    threshold_pips: 200
    protection_pct: 0.90
    tp_active: false
    description: "Maximum — 90% of max profit locked in, peak protection"

# Solara AI Quant - Feature Versions Registry
# 
# Each model is trained on a specific feature version.
# The engine checks model.feature_version against computed features.
# If any required feature is missing, the model is skipped.

versions:
  v1:
    description: "Basic features - BB, RSI, ATR, Volume"
    created: "2025-01-01"
    deprecated: false
    features:
      # OHLCV Base
      - open
      - high
      - low
      - close
      - volume
      
      # Bollinger Bands
      - lower_band
      - middle_band
      - upper_band
      - bb_position        # (close - lower) / (upper - lower)
      - bb_width_pct       # (upper - lower) / middle
      
      # RSI
      - rsi_value          # RSI(14)
      
      # Volume
      - volume_ratio       # Current volume / MA(20) volume
      
      # ATR
      - atr_pct            # ATR / close
      
      # Trend
      - trend_strength     # Price vs EMAs
      
  v2:
    description: "Extended features - adds candle patterns, momentum"
    created: "2025-02-01"
    deprecated: false
    extends: v1
    features:
      # All v1 features plus:
      
      # Candle Patterns
      - candle_body_pct
      - candle_rejection
      - prev_candle_body_pct
      - prev_volume_ratio
      
      # Momentum
      - price_momentum
      - gap_from_prev_close
      
      # BB Touch
      - bb_touch_strength
      - previous_touches
      - time_since_last_touch
      - resistance_distance_pct

  v3:
    description: "Stella Alpha features - full feature set for MTF"
    created: "2025-03-01"
    deprecated: false
    extends: v2
    features:
      # All v2 features plus:
      
      # Session/Time
      - hour
      - day_of_week
      - is_asian_session
      - is_london_session
      - is_ny_session
      - is_overlap_session
      
      # RSI Advanced
      - rsi_slope_3
      - rsi_slope_5
      - rsi_percentile
      - rsi_overbought       # RSI > 70
      - rsi_extreme          # RSI > 80
      
      # BB Advanced
      - bb_squeeze           # Width < percentile 20
      - bb_expansion
      - dist_from_upper
      - dist_from_lower
      
      # Trend Advanced
      - adx
      - trend_direction      # +1 bullish, -1 bearish
      - is_trending          # ADX > 25
      
      # Volatility
      - atr_percentile
      - volatility_regime    # low/medium/high
      
      # D1 Features (from merge)
      - d1_rsi_value
      - d1_bb_position
      - d1_trend_strength
      - d1_trend_direction
      - d1_atr_pct
      - d1_is_trending
      
      # Cross-Timeframe
      - mtf_rsi_aligned      # H4 and D1 RSI both overbought
      - mtf_bb_aligned       # H4 and D1 both near upper BB
      - mtf_trend_aligned    # H4 and D1 same direction
      - mtf_confluence_score # Combined alignment score

  ph1:
    description: "Punk Hazard H4 Reversal — full feature set (Run 29 deployment)"
    created: "2026-03-30"
    deprecated: false
    features:
      # ── Direction-neutral CSV indicators ───────────────────────────────────
      - rsi_value                 # RSI(14) from CSV
      - bb_position               # (close - lower_band) / (upper - lower)
      - bb_width_pct              # (upper - lower) / middle_band
      - atr_pct                   # ATR14 / close
      - candle_body_pct           # |open - close| / (high - low)
      - trend_strength            # normalised SMA50 slope (drives regime axis)
      - volume_ratio              # current vol / 20-bar average vol
      - prev_candle_body_pct      # previous candle body size
      - prev_volume_ratio         # previous candle volume ratio
      - gap_from_prev_close       # open - prev_close (gap signal)

      # ── Long-specific CSV indicators (ph1_long only) ───────────────────────
      - bb_touch_strength_long    # BB lower-band touch strength (ENTRY GATE)
      - candle_rejection_long     # lower-wick rejection off lower band
      - price_momentum_long       # price momentum for long setups
      - previous_touches_long     # count of prior lower-band touches
      - time_since_last_touch_long# bars since last lower-band touch
      - support_distance_pct      # distance from nearest support level

      # ── Short-specific CSV indicators (ph1_short only) ────────────────────
      - bb_touch_strength         # BB upper-band touch strength (ENTRY GATE)
      - candle_rejection          # upper-wick rejection off upper band
      - rsi_divergence            # RSI bearish divergence flag
      - price_momentum            # price momentum for short setups
      - prev_was_rally            # previous candle was significant up move
      - previous_touches          # count of prior upper-band touches
      - time_since_last_touch     # bars since last upper-band touch
      - resistance_distance_pct   # distance from nearest resistance level

      # ── Supplementary computed features (both directions) ─────────────────
      - dist_sma50                # (close - SMA50) / ATR14
      - dist_sma100               # (close - SMA100) / ATR14
      - dist_sma200               # (close - SMA200) / ATR14
      - atr_ratio                 # ATR14 / ATR50 (short vs long-term vol)
      - stoch_k                   # Stochastic %K (14,3)
      - macd_hist                 # MACD histogram (12,26,9) / ATR14
      - dist_extreme              # dist from 20-bar low (long) or high (short) / ATR14
      - body_position             # (close - low) / (high - low) — 0=bottom, 1=top
      - lower_wick_ratio          # lower wick / full candle range
      - upper_wick_ratio          # upper wick / full candle range
      - rsi_slope_5               # RSI[0] - RSI[-5] (momentum divergence proxy)
      - rsi_slope_10              # RSI[0] - RSI[-10]
      - bb_width_zscore           # (bb_width_pct - 50bar_mean) / 50bar_std
      - dist_52w_low              # (close - 252bar_low) / ATR14
      - atr_percentile            # ATR14 rolling 100-bar percentile rank (0-100)
      - atr_longterm_zscore       # Z-score of atr_pct vs 1300-bar rolling window
      - price_accel               # second derivative of close / ATR14
      - vol_divergence            # volume rising while price falling

      # ── Stability-validated lag features ──────────────────────────────────
      # Only 5 lags pass top50_freq >= 70% across 303 walk-forward folds.
      # All other lags were tested and rejected (diluted model, worse EV+%).
      - trend_strength_lag1       # slope deceleration signal (top50=72.8%)
      - bb_width_pct_lag3         # BB contraction 3 bars before touch (73.5%)
      - atr_pct_lag3              # volatility context 3 bars ago (73.9%)
      - atr_ratio_lag2            # short/long vol ratio shift (71.6%)
      - bb_width_zscore_lag2      # zscore trajectory (71.2%)

      # ── Regime features (model input, not just gates) ──────────────────────
      # Both axes are computed from rolling past data — zero look-ahead.
      - regime_volatility         # 0=LowVol (ATR<50th pct), 1=HighVol
      - regime_trend              # -1=Down, 0=Range, +1=Up (SMA50 slope ±0.10)


# Model-to-version mapping (for reference, actual mapping is in model_registry.yaml)
model_requirements:
  stella_alpha_long: v3
  bb_reversal_short: v2
  momentum_scalp: v1
  punk_hazard_long: ph1
  punk_hazard_short: ph1

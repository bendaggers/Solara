# Solara AI Quant - Model Registry
#
# FIELD REFERENCE:
#   timeframe                - The timeframe the model was TRAINED on
#   trigger_timeframes       - Which CSV file changes FIRE this model
#   merge_timeframes         - Additional TFs to merge before feature engineering
#   feature_engineering_class - Python class path for per-model feature engineer
#   confidence_tiers         - Maps confidence ranges to exact lot sizes (fixed_lot)
#                              First matching tier wins. Falls back to 0.01 if no match.
#   timeframe_overrides      - Per-trigger-TF overrides for tp_pips, sl_pips,
#                              max_holding_bars, max_positions.
#                              Only fields you specify are overridden.
#                              Unset fields fall back to the model-level defaults.

models:

  # =========================================================================
  # UBB REJECTION - Upper BB Candle Rejection SHORT
  # v4 — retrained on 10 profitable pairs, broad_v3 candidate mode
  #
  # Training facts:
  #   dataset_rows:      22,853  (10 pairs, broad_v3, filtered)
  #   threshold:         0.84    (chosen by validation search)
  #   test_precision:    95.55%
  #   test_expectancy:   +27.7 pips
  #   test_auc:          0.8113
  #   walk_forward:      4/4 positive splits
  #   pairs_trained_on:  AUDCAD, AUDNZD, AUDUSD, EURUSD, GBPAUD,
  #                      NZDCAD, NZDCHF, NZDJPY, USDCAD, USDCHF
  # =========================================================================
  - name: "UBB Rejection"
    description: "Upper Bollinger Band three-candle A/B/C rejection short — v4 multi-pair"
    class_path: "predictors.ubb_rejection.UBBRejectionPredictor"
    model_file: "ubb_model_v4_10pairs.pkl"
    feature_version: "v3"
    model_type: "SHORT"
    timeframe: "H4"
    trigger_timeframes: ["H4", "M5", "M15", "H1"]
    merge_timeframes: []
    feature_engineering_class: "features.ubb_features.UBBFeatureEngineer"

    # ── Confidence tiers ────────────────────────────────────────────────────
    # Threshold from training: 0.84
    # Any score below 0.84 is ignored by the predictor's pre-filter.
    # Tiers here control lot sizing for the trades that do pass.
    #
    #   0.84 – 0.869  →  0.01 lot   entry level confidence
    #   0.87 – 0.899  →  0.02 lot   solid confidence
    #   0.90 – 0.929  →  0.05 lot   high confidence
    #   0.93 – 1.000  →  0.10 lot   very high confidence
    confidence_tiers:
      - min_confidence: 0.55
        max_confidence: 0.869
        fixed_lot: 0.01
      - min_confidence: 0.87
        max_confidence: 0.899
        fixed_lot: 0.02
      - min_confidence: 0.90
        max_confidence: 0.929
        fixed_lot: 0.05
      - min_confidence: 0.93
        max_confidence: 1.000
        fixed_lot: 0.10

    weight: 1.0
    priority: 1
    timeout: 30
    magic: 200001
    comment: "UBB_Rejection"
    max_positions: 9999

    # ── Default TP/SL (H4 trained values) ──────────────────────────────────
    tp_pips: 40
    sl_pips: 30
    max_holding_bars: 10

    # ── Per-timeframe overrides ─────────────────────────────────────────────
    # The feature engineer finds A/B/C triplets on whatever TF fires.
    # TP/SL are scaled to the smaller bar size for M5/M15/H1.
    timeframe_overrides:
      M5:
        tp_pips: 15
        sl_pips: 10
        max_holding_bars: 24
      M15:
        tp_pips: 20
        sl_pips: 10
        max_holding_bars: 99
      H1:
        tp_pips: 30
        sl_pips: 15
        max_holding_bars: 99

    # ── Restrict to trained pairs only ─────────────────────────────────────
    # The model was trained on 10 pairs with confirmed baseline edge.
    # Trading other pairs risks applying the model out-of-distribution.
    symbols:
      - AUDCAD
      - AUDNZD
      - AUDUSD
      - EURUSD
      - GBPAUD
      - NZDCAD
      - NZDCHF
      - NZDJPY
      - USDCAD
      - USDCHF

    enabled: false


  # =========================================================================
  # PUNK HAZARD LONG — EURUSD H4 BB Lower-Band Reversal
  # Run 29 deployment candidate — sigmoid calibration, proba=0.50
  #
  # Training facts (Run 29 walk-forward, 303 folds, 2000–2025):
  #   instrument:        EURUSD H4
  #   ev_mean_pips:      +5.19  (net of spread est. +3.7–4.7p)
  #   ev_positive_rate:  54.7%  of folds  (target ≥80%, structural gap)
  #   precision_mean:    0.447  (raw BB-touch win rate ~41%)
  #   ece:               0.179  (sigmoid calibration — best in project)
  #   2020-2025_ev:      +3.97  (first positive era in 29 runs)
  #   n_valid_folds:     232 / 303
  #   calibration:       CalibratedClassifierCV(cv=5, method='sigmoid')
  #   lgbm_params:       n_est=150, lr=0.05, depth=6, leaves=31, mc=5
  #   train_window:      6 months  (confirmed optimal vs 9/12/18mo)
  #
  # Entry logic:
  #   Gate 1 — bb_touch_strength_long > 0.997 (BB lower-band touch)
  #   Gate 2 — regime not in {HighVol+Down, LowVol+Up}
  #   Gate 3 — P(win) >= 0.50
  #
  # TP/SL are loaded from the .pkl export (optimised per training window).
  # Typical range: TP 40-80p, SL 30-60p, min RR 1.30.
  # =========================================================================
  - name: "Punk Hazard Long"
    description: "EURUSD H4 BB lower-band mean-reversion LONG — Run 29"
    class_path: "predictors.punk_hazard_long.PunkHazardLongPredictor"
    model_file: "punk_hazard_long.pkl"
    feature_version: "ph1"
    model_type: "LONG"
    timeframe: "H4"
    trigger_timeframes: ["M15", "H1", "H4"]
    merge_timeframes: []
    feature_engineering_class: "features.punk_hazard_features.PunkHazardFeatureEngineer"

    # ── Confidence tiers ────────────────────────────────────────────────────
    # Proba threshold locked at 0.50 (Run 29 — sigmoid + 0.50 optimal).
    # Tiers are conservative — sigmoid probas cluster in the 0.48-0.60 range.
    # Do NOT raise threshold above 0.55 — volume loss outweighs precision gain.
    confidence_tiers:
      - min_confidence: 0.50
        max_confidence: 0.529
        fixed_lot: 0.01
      - min_confidence: 0.53
        max_confidence: 0.559
        fixed_lot: 0.02
      - min_confidence: 0.56
        max_confidence: 0.599
        fixed_lot: 0.05
      - min_confidence: 0.60
        max_confidence: 1.000
        fixed_lot: 0.10

    weight: 1.0
    priority: 3
    timeout: 30
    magic: 300401
    comment: "PH_Long"
    max_positions: 999        # EURUSD only — one long position at a time

    # Default TP/SL loaded from .pkl export; these are fallbacks only.
    # export_model.py optimises TP/SL on the training window and saves them.
    # Typical: TP=60p, SL=40p (run-dependent)
    tp_pips: 60
    sl_pips: 40
    max_holding_bars: 30    # matches timeout_default = 20 bars + buffer

    symbols:
      - EURUSD
      - GBPUSD
      - USDJPY
      - USDCHF
      - AUDUSD
      - USDCAD
      - NZDUSD
      - EURGBP
      - EURJPY
      - EURCHF
      - EURAUD
      - EURCAD
      - EURNZD
      - GBPJPY
      - GBPCHF
      - GBPAUD
      - GBPCAD
      - GBPNZD
      - AUDJPY
      - AUDCHF
      - AUDCAD
      - AUDNZD
      - NZDJPY
      - NZDCHF
      - NZDCAD
      - CADJPY
      - CADCHF
      - CHFJPY

    enabled: false          # set true after punk_hazard_long.pkl is generated


  # =========================================================================
  # PUNK HAZARD SHORT — EURUSD H4 BB Upper-Band Reversal
  # Run 29 deployment candidate — sigmoid calibration, proba=0.48
  #
  # Training facts (Run 29 walk-forward, 303 folds, 2000–2025):
  #   instrument:        EURUSD H4
  #   temporal_edge:     dominant 2010–2025 (short complements long pre-2010)
  #   ev_2010-2025:      +6.00 / +4.54 / +3.97 pips by era
  #   calibration:       CalibratedClassifierCV(cv=5, method='sigmoid')
  #   proba_threshold:   0.48  (intentionally lower than long — tuned in isolation)
  #
  # IMPORTANT: Do NOT raise proba_threshold to 0.52 in combined mode.
  # Run 21 confirmed: raising short threshold causes negative interaction —
  # short entries removed from HighVol+Range get replaced by long entries
  # which are negative in 2020–2025.  HighVol+Range EV flipped +1.05→-0.42.
  #
  # Entry logic:
  #   Gate 1 — bb_touch_strength > 0.997 (BB upper-band touch)
  #   Gate 2 — regime not in {LowVol+Up}  (HighVol+Range is ACTIVE — restoring
  #             it improved EV+% 42.5%→45.8% and added 21 valid folds per Run 19)
  #   Gate 3 — P(win) >= 0.48
  # =========================================================================
  - name: "Punk Hazard Short"
    enabled: false          # set true after punk_hazard_short.pkl is generated
    description: "EURUSD H4 BB upper-band mean-reversion SHORT — Run 29"
    class_path: "predictors.punk_hazard_short.PunkHazardShortPredictor"
    model_file: "punk_hazard_short.pkl"
    feature_version: "ph1"
    model_type: "SHORT"
    timeframe: "H4"
    trigger_timeframes: ["M15", "H1", "H4"]
    merge_timeframes: []
    feature_engineering_class: "features.punk_hazard_features.PunkHazardFeatureEngineer"

    # ── Confidence tiers ────────────────────────────────────────────────────
    # Short threshold = 0.48 (lower than long because sigmoid compresses probas
    # and short has slightly lower baseline precision).
    confidence_tiers:
      - min_confidence: 0.48
        max_confidence: 0.509
        fixed_lot: 0.01
      - min_confidence: 0.51
        max_confidence: 0.539
        fixed_lot: 0.02
      - min_confidence: 0.54
        max_confidence: 0.579
        fixed_lot: 0.05
      - min_confidence: 0.58
        max_confidence: 1.000
        fixed_lot: 0.10

    weight: 1.0
    priority: 4
    timeout: 30
    magic: 300402
    comment: "PH_Short"
    max_positions: 1        # EURUSD only — one short position at a time

    # Default TP/SL fallbacks (actual values loaded from .pkl export)
    tp_pips: 60
    sl_pips: 40
    max_holding_bars: 30

    symbols:
      - EURUSD
      - GBPUSD
      - USDJPY
      - USDCHF
      - AUDUSD
      - USDCAD
      - NZDUSD
      - EURGBP
      - EURJPY
      - EURCHF
      - EURAUD
      - EURCAD
      - EURNZD
      - GBPJPY
      - GBPCHF
      - GBPAUD
      - GBPCAD
      - GBPNZD
      - AUDJPY
      - AUDCHF
      - AUDCAD
      - AUDNZD
      - NZDJPY
      - NZDCHF
      - NZDCAD
      - CADJPY
      - CADCHF

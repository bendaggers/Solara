# ═══════════════════════════════════════════════════════════════════════════════
# Solara AI Quant — Model Registry
# ═══════════════════════════════════════════════════════════════════════════════
#
# This is the ONLY file you edit to add, remove, or toggle a model.
# No Python code changes are required anywhere else.
#
# ADDING A NEW MODEL:
#   1. Train model → save .pkl to Models/ directory
#   2. Create predictor class → predictors/[your_strategy].py
#   3. Add entry below with all required fields
#   4. Set enabled: true
#   5. Restart SAQ (or hot-reload in Phase 3)
#
# MAGIC NUMBER CONVENTION:
#   Format: [StrategyID][TimeframeCode][Sequence]
#   StrategyID: 20xxxx=BB Reversal, 30xxxx=RSI, 40xxxx=MACD, 50xxxx=Custom
#   TimeframeCode (3rd digit): x0xxxx=H4, x1xxxx=H1, x2xxxx=M15, x3xxxx=M5
#   Example: 201000 = BB Reversal, H4, model #1
#
# FIELD REFERENCE:
#   name           str    Unique human-readable label (shown in logs & dashboard)
#   class_path     str    Python import path: module.ClassName
#   model_file     str    .pkl filename inside Models/ directory
#   feature_version str   Must match a version key in features/feature_versions.yaml
#   model_type     str    LONG or SHORT
#   timeframe      str    M5 | M15 | H1 | H4
#   min_confidence float  Minimum confidence to generate a signal (0.01–1.00)
#   weight         float  Aggregation weight (0.1–2.0)
#   priority       int    Queue priority — lower number runs first (1–100)
#   timeout        int    Per-model execution timeout in seconds (5–300)
#   magic          int    UNIQUE MT5 magic number — no two models may share one
#   comment        str    MT5 trade comment prefix (confidence appended at runtime)
#   enabled        bool   false = model is registered but excluded from all cycles
#   max_positions  int    Max simultaneous open positions for this model (1–20)
#   symbols        list   Symbol whitelist — empty list means all symbols in data
# ═══════════════════════════════════════════════════════════════════════════════

models:

  # ── BB Reversal Long H4 ────────────────────────────────────────────────────
  - name: "BB Reversal Long H4 v2"
    class_path: "predictors.bb_reversal_long.BBReversalLongPredictor"
    model_file: "BB_LONG_v2.pkl"
    feature_version: "v3"
    model_type: "LONG"
    timeframe: "H4"
    min_confidence: 0.65
    weight: 1.0
    priority: 1
    timeout: 30
    magic: 201000
    comment: "SAQ_BBLong_H4"
    enabled: true
    max_positions: 3
    symbols: []

  # ── BB Reversal Short H4 ───────────────────────────────────────────────────
  - name: "BB Reversal Short H4 v2"
    class_path: "predictors.bb_reversal_short.BBReversalShortPredictor"
    model_file: "BB_SHORT_v2.pkl"
    feature_version: "v3"
    model_type: "SHORT"
    timeframe: "H4"
    min_confidence: 0.70
    weight: 1.0
    priority: 1
    timeout: 30
    magic: 202000
    comment: "SAQ_BBShort_H4"
    enabled: true
    max_positions: 3
    symbols: []

  # ── TEMPLATE — copy this block to add a new model ─────────────────────────
  # - name: "Strategy Name TF vN"
  #   class_path: "predictors.your_module.YourPredictorClass"
  #   model_file: "YOUR_MODEL_vN.pkl"
  #   feature_version: "v3"
  #   model_type: "LONG"          # LONG or SHORT
  #   timeframe: "M15"            # M5 | M15 | H1 | H4
  #   min_confidence: 0.70
  #   weight: 1.0
  #   priority: 2
  #   timeout: 30
  #   magic: 301000               # MUST be unique across all entries
  #   comment: "SAQ_YourStrategy"
  #   enabled: false              # set true when ready
  #   max_positions: 3
  #   symbols: []                 # [] = all symbols, or ["EURUSD", "GBPUSD"]

# Solara AI Quant - Model Registry
# 
# Register all ML models here. Each model must have:
# - Unique name and magic number
# - Class path to predictor implementation
# - Model file (.pkl) in Models/ directory
# - Feature version it was trained on
#
# To add a new model:
# 1. Train the model and save to Models/<name>.pkl
# 2. Create predictor class in predictors/<strategy>.py
# 3. Add entry here with unique magic number
# 4. Restart SAQ

models:
  # =========================================================================
  # STELLA ALPHA - Primary Model (MTF Trend Following LONG)
  # =========================================================================
  - name: "Stella Alpha Long"
    description: "Multi-timeframe trend following LONG strategy using H4+D1 confluence"
    class_path: "predictors.stella_alpha_long.StellaAlphaLongPredictor"
    model_file: "stella_alpha_long.pkl"
    feature_version: "v3"
    model_type: "LONG"
    timeframe: "H4"
    
    # Prediction settings
    min_confidence: 0.45          # Minimum probability to generate signal
    threshold: 0.45               # Decision threshold (from training)
    
    # Aggregation
    weight: 1.0                   # Weight in signal aggregation
    priority: 1                   # Lower = runs first
    
    # Execution
    timeout: 30                   # Max seconds for prediction
    magic: 100001                 # Unique MT5 magic number
    comment: "SAQ_StellaAlpha"    # Trade comment
    
    # Position management
    max_positions: 3              # Max concurrent positions for this model
    
    # Trade parameters (from Stella Alpha training)
    tp_pips: 100                  # Take profit
    sl_pips: 50                   # Stop loss
    max_holding_bars: 72          # Max bars before forced close
    
    # Filters
    symbols: []                   # Empty = all symbols; or ["EURUSD", "GBPUSD"]
    
    # Status
    enabled: true

  # =========================================================================
  # EXAMPLE: BB Reversal Short (Template for future models)
  # =========================================================================
  # - name: "BB Reversal Short"
  #   description: "Bollinger Band mean reversion SHORT strategy"
  #   class_path: "predictors.bb_reversal_short.BBReversalShortPredictor"
  #   model_file: "bb_reversal_short.pkl"

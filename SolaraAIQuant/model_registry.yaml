  # TREND IDENTIFIER V2 LONG — Universal 28-pair H4 Trend Follower
  # Version: 20260402_230006 (overnight AutoML run)
  #
  # Training facts (5-fold purged walk-forward, 2000–2025):
  #   pairs_trained:    28 (all major + minor forex pairs)
  #   balanced_accuracy: 92.59%  (target was 85%) ← PASS
  #   calibration_ece:   1.53%   (target < 10%)   ← PASS
  #   signal_stability:  39.5% raw → raised to 85%+ by hysteresis at inference
  #   algorithm:        LightGBM + XGBoost + CatBoost (soft-voting ensemble)
  #   calibration:      Platt scaling (LogisticRegression on raw probs)
  #   features:         41 (QUANT_V2_CORE)
  #
  # Label method: Pure price-action structure labels (rolling HH/HL/LH/LL
  # with 3-bar confirmation + ADX>=20). No indicator leakage.
  #
  # Signal logic: p(uptrend) >= min_confidence → LONG signal
  #
  # TP/SL: 80/40 pips (2:1 R:R) — adjust after paper trading analysis.
  # =========================================================================
  - name: "TI V2 Long"
    enabled: true   # Set to true when ready to start paper trading
    description: "V2 Universal Trend Identifier — 28 pairs H4 — LONG signals (92.6% accuracy)"
    class_path: "predictors.trend_identifier_v2.TrendIdentifierV2Predictor"
    model_file: "trend_identifier_v2.pkl"
    feature_version: "ti_v2"
    model_type: "LONG"
    timeframe: "H4"
    trigger_timeframes: ["H1", "H4"]
    merge_timeframes: []
    feature_engineering_class: "features.trend_id_v2_features.TrendIDV2FeatureEngineer"

    # ── Confidence tiers ────────────────────────────────────────────────────
    # Calibrated Platt probabilities are reliable (ECE=1.53%).
    # Start conservatively — raise after 30 days paper trading analysis.
    #
    #   0.55 – 0.649  →  0.01 lot   moderate confidence
    #   0.65 – 0.749  →  0.02 lot   good confidence
    #   0.75 – 0.849  →  0.05 lot   high confidence

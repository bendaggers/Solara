# =========================================================================
# MAGIC NUMBER CONVENTION
# =========================================================================
# Format: XXYYZZ
# XX = Strategy ID, YY = Timeframe (01=M5,02=M15,03=H1,04=H4,05=D1), ZZ = Variant

# =========================================================================
# FEATURE VERSIONS
# =========================================================================
# v1: Basic (BB, RSI, ATR, Volume)
# v2: Extended (+candle patterns, momentum)
# v3: Full MTF (+D1 or other TF merge, cross-timeframe, session)

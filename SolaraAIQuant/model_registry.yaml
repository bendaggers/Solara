# Solara AI Quant - Model Registry
# 
# FIELD REFERENCE:
#   timeframe          - The timeframe the model was TRAINED on
#   trigger_timeframes - Which CSV file changes FIRE this model
#   merge_timeframes   - Additional timeframes to merge INTO the trigger data
#                        before feature engineering and prediction.
#                        The trigger TF is always the BASE — only list the
#                        ADDITIONAL timeframes to bring in here.
#                        Columns are prefixed with the TF name (d1_, h4_, etc.)
#                        Leave empty [] if no merging needed.
#
# Examples:
#   Model A: trigger=H4, merge=[D1]     → base is H4, gets d1_ columns
#   Model B: trigger=M5, merge=[D1]     → base is M5, gets d1_ columns
#   Model C: trigger=M5, merge=[H4]     → base is M5, gets h4_ columns
#   Model D: trigger=M5, merge=[H4,D1]  → base is M5, gets h4_ and d1_ columns

models:
  # =========================================================================
  # STELLA ALPHA - Primary Model (MTF Trend Following LONG)
  # =========================================================================
  - name: "Stella Alpha Long"
    description: "Multi-timeframe trend following LONG strategy using H4+D1 confluence"
    class_path: "predictors.stella_alpha_long.StellaAlphaLongPredictor"
    model_file: "stella_alpha_long.pkl"
    feature_version: "v3"
    model_type: "LONG"
    timeframe: "H4"
    trigger_timeframes: ["M5", "H4"]
    merge_timeframes: ["D1"]               # Merge D1 → adds d1_ columns

    min_confidence: 0.45
    threshold: 0.45
    weight: 1.0
    priority: 1
    timeout: 30
    magic: 100001
    comment: "SAQ_StellaAlpha"
    max_positions: 3
    tp_pips: 100
    sl_pips: 50
    max_holding_bars: 72
    symbols: []
    enabled: true

  # =========================================================================
  # EXAMPLE: Scalp model — M5 base, merges H4 context

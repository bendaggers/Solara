        max_confidence: 0.849
        fixed_lot: 0.03
      - min_confidence: 0.85
        max_confidence: 1.000
        fixed_lot: 0.05

    weight: 1.0
    priority: 5
    timeout: 60
    magic: 400401
    comment: "TI_V2_Long"
    max_positions: 999

    # TP/SL: conservative trend-following defaults (2:1 R:R on H4)
    # Review and tune after 30 days of paper trading.
    tp_pips: 80
    sl_pips: 40
    max_holding_bars: 36     # ~6 days on H4

    # ── Per-timeframe overrides ─────────────────────────────────────────────

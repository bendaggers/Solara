  # =========================================================================
  # TREND REVERSAL SHORT H4 — Universal 28-pair H4 Reversal Entry
  # Trained: 2026-04-15 | SL=20p / TP=60p | 28 pairs | 1999–2025
  #
  # Training facts (5-fold expanding walk-forward):
  #   algorithm:          XGBoost binary:logistic
  #   features:           19 (H4 break-bar + trend context)
  #   threshold:          0.74 (median across folds, WF-optimised)
  #   mean_precision:     59.3% ± 10.9%
  #   mean_EV_trade:      +27.4 ± 8.7 pips
  #   break_even_prec:    25.0%
  #   worst_fold:         44.4% (2019–2022, COVID era)
  #   all_folds_pos_EV:   true
  #   signal_rate:        ~15–20 signals/year at threshold=0.50 (was 10-14 at 0.60, 5-7 at 0.74)
  #
  # Detection logic (in ReversalShortFeatureEngineer):
  #   1. H4 cascade flip  — predicted_class flips uptrend→downtrend within 6 bars

        max_confidence: 0.649
        fixed_lot: 0.01
      - min_confidence: 0.65
        max_confidence: 0.749
        fixed_lot: 0.02
      - min_confidence: 0.75
        max_confidence: 1.000
        fixed_lot: 0.03

    weight: 1.0
    priority: 11
    timeout: 120     # compression detection + trend models + breakout model per symbol
    magic: 700301
    comment: "VB_Short"

  #   max_holding_bars: 36
  #   symbols: ["EURUSD"]
  #   enabled: false

# =========================================================================
# MAGIC NUMBER CONVENTION
# =========================================================================
# 
# Format: XXYYZZ
# XX = Strategy ID (10-99)
# YY = Timeframe (01=M5, 02=M15, 03=H1, 04=H4, 05=D1)
# ZZ = Variant (01-99)
#
# Examples:
#   100001 = Strategy 10, H4, Variant 01 (Stella Alpha)
#   100401 = Strategy 10, H4, Variant 01 
#   200301 = Strategy 20, H1, Variant 01
#   300201 = Strategy 30, M15, Variant 01

# =========================================================================
# FEATURE VERSIONS
# =========================================================================
#
# v1: Basic features (BB, RSI, ATR, Volume)
# v2: Extended features (+candle patterns, momentum)
# v3: Full MTF features (+D1, cross-timeframe, session)
#
# Models must specify which version they were trained on.
# The engine validates features before running predictions.

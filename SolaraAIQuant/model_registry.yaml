  # =========================================================================
  # PULL BACK ENTRY LONG — Universal 28-pair H1 Pullback Entry
  # Version: 1.3.0 (2026-04-08, walk-forward validated)
  #
  # Training facts (6-fold expanding walk-forward, 28 pairs, 1999–2025):
  #   algorithm:         XGBoost binary:logistic
  #   features:          37 (H1 CSV + computed structure + H4 context)
  #   entry_threshold:   0.80 (auto-tuned per fold)
  #   pb_threshold:      0.65 (H4 pullback model class-2)
  #   tp_pips:           30 / sl_pips: 20 (1:1.5 RR)
  #   mean_precision:    0.693 ± 0.025
  #   mean_EV_trade:     +14.6 ± 1.2 pips
  #   combined_pipeline: 0.691 precision, +14.6 EV/trade (all 6 folds positive)
  #
  # 3-stage pipeline:
  #   Stage 1 — W1 + D1 + H4 trend models: ≥ 2/3 must agree (uptrend for LONG)
  #   Stage 2 — H4 pullback model: class-2 prob ≥ 0.65 (exhaustion confirmed)
  #   Stage 3 — H1 entry model:    prob ≥ 0.80
  #
  # The feature engineer (PullBackFeatureEngineer) loads H4/D1/W1 CSVs
  # directly and runs all three trend models internally.
  # merge_timeframes is [] — no pipeline-level merging needed.
  # =========================================================================
  - name: "Pull Back Entry Long"
    enabled: true   # Set true after paper trading validation
    description: "3-stage pullback entry LONG — trend alignment + H4 exhaustion + H1 entry (28 pairs)"
    class_path: "predictors.pull_back_entry.PullBackEntryPredictor"
    model_file: "pull_back_entry_h1.joblib"
    feature_version: "pb1"
    model_type: "LONG"
    timeframe: "H1"
    trigger_timeframes: ["H1"]
    merge_timeframes: []
    feature_engineering_class: "features.pull_back_features.PullBackFeatureEngineer"

    # ── Pull Back pipeline thresholds ───────────────────────────────────────
    # Gate 3: H4 pullback exhaustion prob — restored to walk-forward trained value
    pb_exhaust_threshold: 0.65

    # ── Confidence tiers (entry_prob from XGBoost) ──────────────────────────
    # Gate 4: entry model — restored to walk-forward trained threshold (0.80)
    # Lowering to 0.65 on 2026-04-15 let in marginal signals that degraded precision.
    confidence_tiers:
      - min_confidence: 0.80
        max_confidence: 0.849
        fixed_lot: 0.01
      - min_confidence: 0.85
        max_confidence: 0.899
        fixed_lot: 0.01
      - min_confidence: 0.90
        max_confidence: 0.949
        fixed_lot: 0.02
      - min_confidence: 0.95
        max_confidence: 1.000
        fixed_lot: 0.03

    weight: 1.0
    priority: 7
    timeout: 90          # trend models take longer than single-model inference
    magic: 500301
    comment: "PB_Long"
    max_positions: 10

    tp_pips: 30
    sl_pips: 20
    max_holding_bars: 24   # 24 H1 bars = 1 day

    symbols:
      - AUDCAD
      - AUDCHF
      - AUDJPY
      - AUDNZD
      - AUDUSD
      - CADCHF
      - CADJPY
      - CHFJPY
      - EURAUD
      - EURCAD
      - EURCHF
      - EURGBP
      - EURJPY
      - EURNZD
      - EURUSD
      - GBPAUD
      - GBPCAD
      - GBPCHF
      - GBPJPY

# Solara AI Quant - Survivor Engine Stage Definitions
#
# Pull Back Strategy — Optimised for 30-pip TP / 20-pip SL
#
# Key design principles (Option B):
#   - TP removed at Stage 4 (25p profit) — 5-pip buffer before 30p TP
#   - With 30s check interval, 5-pip buffer is safe under normal conditions
#   - Early stages (4-5) use high protection % to lock in near-TP value
#   - Stages 6 deliberately holds SL at +25p (no regression — SL never goes backward)
#   - From Stage 7 onward SL advances beyond original TP value → rider territory
#   - SL formula: entry + (max_profit_pips × protection_pct)
#   - Stages only move forward (never backward)

version: "1.0"
description: "22-Stage Progressive Trailing Stop — Pull Back Optimised (Option B)"

# Global settings
settings:
  min_profit_to_start: 10        # Minimum pips profit before any trailing
  check_interval_seconds: 30     # How often to check positions (was 60 — halved for tighter SL trailing)
  use_server_time: true          # Use MT5 server time for checks
  pip_buffer: 2                  # Buffer pips to account for spread
  remove_tp_at_stage: 4          # Remove TP at Stage 4 (25p profit).
                                 # 5-pip gap before 30p TP — gives Survivor time to
                                 # remove before MT5 triggers. After removal the
                                 # trailing SL is the sole exit mechanism.

# Stage definitions
# SL at each stage = trigger_pips × protection_pct  (must always advance)
stages:
  # Stage 0: Initial (no protection)
  - stage: 0
    trigger_pips: 0
    protection_pct: 0.0
    description: "Initial - no trailing yet"

  # Stages 1-3: Soft floor before TP removal (TP still active)
  - stage: 1
    trigger_pips: 10
    protection_pct: 0.20
    description: "Soft floor +2p — TP still active"

  - stage: 2
    trigger_pips: 15
    protection_pct: 0.25
    description: "Soft floor +3.75p — TP still active"

  - stage: 3
    trigger_pips: 20
    protection_pct: 0.30
    description: "Soft floor +6p — TP still active"

  # Stage 4: TP REMOVED HERE — 5-pip buffer before 30p TP
  # SL at +5p gives 20 pips breathing room (similar to original trade character)
  - stage: 4
    trigger_pips: 25
    protection_pct: 0.20
    description: "TP removed — SL at +5p (20p breathing room)"

  # Stage 5: Price at original TP level — SL at +10p, still 20p room
  - stage: 5
    trigger_pips: 30
    protection_pct: 0.33
    description: "SL at +10p — still breathing"

  # Stage 6: SL advances to +15p, 20p room before current price
  - stage: 6
    trigger_pips: 35
    protection_pct: 0.43
    description: "SL at +15p — breathing room maintained"

  # Stage 7+: Runner territory — SL now exceeds original TP value
  - stage: 7
    trigger_pips: 40
    protection_pct: 0.75
    description: "Runner — SL at +30p (beyond original TP)"

  - stage: 8
    trigger_pips: 45
    protection_pct: 0.75
    description: "Runner — SL at +33.75p"

  - stage: 9
    trigger_pips: 50
    protection_pct: 0.76
    description: "Runner — SL at +38p"

  - stage: 10
    trigger_pips: 55
    protection_pct: 0.76
    description: "Runner — SL at +41.8p"

  - stage: 11
    trigger_pips: 60
    protection_pct: 0.80
    description: "Runner — SL at +48p"

  - stage: 12
    trigger_pips: 65
    protection_pct: 0.75
    description: "Runner — SL at +48.75p"

  - stage: 13
    trigger_pips: 70
    protection_pct: 0.75
    description: "Runner — SL at +52.5p"

  - stage: 14
    trigger_pips: 75
    protection_pct: 0.72
    description: "Runner — SL at +54p"

  - stage: 15
    trigger_pips: 80
    protection_pct: 0.70
    description: "Runner — SL at +56p"

  - stage: 16
    trigger_pips: 90
    protection_pct: 0.72
    description: "Runner — SL at +64.8p"

  - stage: 17
    trigger_pips: 100
    protection_pct: 0.75
    description: "Runner — SL at +75p"

  - stage: 18
    trigger_pips: 120
    protection_pct: 0.78
    description: "Runner — SL at +93.6p"

  - stage: 19
    trigger_pips: 140
    protection_pct: 0.80
    description: "Runner — SL at +112p"

  - stage: 20
    trigger_pips: 160
    protection_pct: 0.82
    description: "Runner — SL at +131.2p"

  - stage: 21
    trigger_pips: 180
    protection_pct: 0.85
    description: "Runner — SL at +153p"

  - stage: 22
    trigger_pips: 200
    protection_pct: 0.88
    description: "Maximum protection — SL at +176p"

# SL progression summary (what the trader sees):
#   Entry    →  SL: none (raw SL only)
#   +10p     →  SL: +2p
#   +15p     →  SL: +3.75p
#   +20p     →  SL: +6p
#   +25p     →  SL: +5p   ← TP removed here (20p breathing room)
#   +30p     →  SL: +10p  ← 20p breathing room
#   +35p     →  SL: +15p  ← 20p breathing room
#   +40p     →  SL: +30p  ← runner starts, now BETTER than original TP
#   +50p     →  SL: +38p
#   +60p     →  SL: +48p
#   +75p     →  SL: +54p
#   +100p    →  SL: +75p
#   +150p    →  SL: +120p
#   +200p    →  SL: +176p

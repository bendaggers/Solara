# Solara AI Quant - Survivor Engine Stage Definitions
#
# Pull Back Strategy — Optimised for 30-pip TP / 20-pip SL
#
# Key design principles:
#   - TP removed at Stage 4 (25p profit) — 5-pip buffer before 30p TP
#   - Stages 4-6: loose protection (~20p breathing room) matching original trade character
#   - Stage 7+: runner territory — SL advances beyond original TP value
#   - All SL values are whole numbers (protection_pct chosen to floor to clean integers)
#   - SL formula: floor(max_profit_pips × protection_pct)
#   - Stages only move forward (never backward)

version: "1.0"
description: "22-Stage Progressive Trailing Stop — Pull Back Optimised"

# Global settings
settings:
  min_profit_to_start: 10        # Minimum pips profit before any trailing
  check_interval_seconds: 30     # 30s checks — halved from 60s for tighter trailing
  use_server_time: true
  pip_buffer: 2
  remove_tp_at_stage: 4          # Remove TP at Stage 4 (25p profit, 5-pip buffer before 30p TP)

stages:
  - stage: 0
    trigger_pips: 0
    protection_pct: 0.0
    description: "Initial — no trailing yet"

  # Stages 1-3: soft floor, TP still active
  - stage: 1
    trigger_pips: 10
    protection_pct: 0.20
    description: "Soft floor — SL at +2p  (TP active)"

  - stage: 2
    trigger_pips: 15
    protection_pct: 0.20
    description: "Soft floor — SL at +3p  (TP active)"

  - stage: 3
    trigger_pips: 20
    protection_pct: 0.20
    description: "Soft floor — SL at +4p  (TP active)"

  # Stage 4: TP REMOVED — 20p breathing room
  - stage: 4
    trigger_pips: 25
    protection_pct: 0.20
    description: "TP removed — SL at +5p  (20p breathing room)"

  - stage: 5
    trigger_pips: 30
    protection_pct: 0.34
    description: "SL at +10p (20p breathing room)"

  - stage: 6
    trigger_pips: 35
    protection_pct: 0.43
    description: "SL at +15p (20p breathing room)"

  # Stage 7: runner territory — SL now beyond original TP
  - stage: 7
    trigger_pips: 40
    protection_pct: 0.75
    description: "Runner — SL at +30p (beyond original TP)"

  - stage: 8
    trigger_pips: 45
    protection_pct: 0.74
    description: "Runner — SL at +33p"

  - stage: 9
    trigger_pips: 50
    protection_pct: 0.76
    description: "Runner — SL at +38p"

  - stage: 10
    trigger_pips: 55
    protection_pct: 0.75
    description: "Runner — SL at +41p"

  - stage: 11
    trigger_pips: 60
    protection_pct: 0.80
    description: "Runner — SL at +48p"

  - stage: 12
    trigger_pips: 65
    protection_pct: 0.77
    description: "Runner — SL at +50p"

  - stage: 13
    trigger_pips: 70
    protection_pct: 0.75
    description: "Runner — SL at +52p"

  - stage: 14
    trigger_pips: 75
    protection_pct: 0.72
    description: "Runner — SL at +54p"

  - stage: 15
    trigger_pips: 80
    protection_pct: 0.70
    description: "Runner — SL at +56p"

  - stage: 16
    trigger_pips: 90
    protection_pct: 0.72
    description: "Runner — SL at +64p"

  - stage: 17
    trigger_pips: 100
    protection_pct: 0.75
    description: "Runner — SL at +75p"

  - stage: 18
    trigger_pips: 120
    protection_pct: 0.78
    description: "Runner — SL at +93p"

  - stage: 19
    trigger_pips: 140
    protection_pct: 0.80
    description: "Runner — SL at +112p"

  - stage: 20
    trigger_pips: 160
    protection_pct: 0.82
    description: "Runner — SL at +131p"

  - stage: 21
    trigger_pips: 180
    protection_pct: 0.85
    description: "Runner — SL at +153p"

  - stage: 22
    trigger_pips: 200
    protection_pct: 0.88
    description: "Maximum protection — SL at +176p"

# SL progression (whole numbers, rounded down):
#
#   Profit   SL      Room
#   ──────   ───     ────
#   +10p  →  +2p     8p    (TP active)
#   +15p  →  +3p     12p   (TP active)
#   +20p  →  +4p     16p   (TP active)
#   +25p  →  +5p     20p   ← TP removed here
#   +30p  →  +10p    20p
#   +35p  →  +15p    20p
#   +40p  →  +30p    10p   ← runner starts
#   +45p  →  +33p    12p
#   +50p  →  +38p    12p
#   +55p  →  +41p    14p
#   +60p  →  +48p    12p
#   +65p  →  +50p    15p
#   +70p  →  +52p    18p
#   +75p  →  +54p    21p
#   +80p  →  +56p    24p
#   +90p  →  +64p    26p
#   +100p →  +75p    25p
#   +120p →  +93p    27p
#   +140p →  +112p   28p
#   +150p →  +120p   30p   (interpolated — Stage 19 at 80%)
#   +160p →  +131p   29p
#   +180p →  +153p   27p
#   +200p →  +176p   24p
